<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O365 OAuth Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF5F1; --panel-strong:rgba(255,255,255,.92);
    --txt:#292F36; --txt2:#292F36; --txt3:#727477;
    --signal:#A41F13; --ok:#3A7A50; --bad:#A41F13;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:"IBM Plex Sans Thai",-apple-system,system-ui,sans-serif;
    --glass-bg:rgba(255,255,255,.82);
    --glass-border:rgba(255,255,255,.7);
    --glass-highlight:rgba(255,255,255,.9);
    --glass-shadow:rgba(41,47,54,.22);
    --accent-blue:#3B82F6; --accent-blue-dim:rgba(59,130,246,.16);
    --accent-green:#22C08C; --accent-green-dim:rgba(34,192,140,.16);
    --bg-glow-1:rgba(59,130,246,.30); --bg-glow-2:rgba(34,192,140,.26); --bg-glow-3:rgba(59,130,246,.16);
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:var(--sans);color:var(--txt);min-height:100vh;font-size:14px;line-height:1.5;
    display:flex;align-items:center;justify-content:center;padding:20px;
    background:
      radial-gradient(1100px 560px at 88% -8%, var(--bg-glow-1) 0%, transparent 60%),
      radial-gradient(900px 520px at -6% 22%, var(--bg-glow-2) 0%, transparent 58%),
      radial-gradient(820px 600px at 55% 112%, var(--bg-glow-3) 0%, transparent 62%),
      var(--bg);
  }
  .box{
    position:relative;background:var(--panel-strong);border:1px solid var(--glass-border);
    border-radius:20px;padding:34px 38px;max-width:440px;width:100%;
    backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);
    box-shadow:inset 0 1px 0 var(--glass-highlight),0 16px 44px var(--glass-shadow);
    overflow:hidden;
  }
  .box::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;
    background:linear-gradient(90deg,var(--accent-blue),var(--accent-green));opacity:.85}
  .tag{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;
    text-transform:uppercase;color:var(--txt3);border:1px solid var(--glass-border);
    background:var(--glass-bg);border-radius:5px;padding:3px 8px;margin-bottom:16px}
  h1{font-size:19px;font-weight:700;margin:0 0 6px;color:var(--txt)}
  p.sub{color:var(--txt3);font-size:13px;margin:0 0 26px;line-height:1.6}
  a.btn{
    display:inline-flex;align-items:center;gap:9px;color:#fff;text-decoration:none;
    padding:11px 20px;border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:600;
    background:linear-gradient(135deg,var(--accent-blue),var(--accent-green));
    box-shadow:0 6px 18px rgba(59,130,246,.28);transition:transform .15s ease,box-shadow .15s ease;
  }
  a.btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(59,130,246,.36)}
  a.btn:active{transform:translateY(0) scale(.98)}
  a.btn svg{width:16px;height:16px;flex-shrink:0}
  .result{
    margin-top:22px;padding:14px 16px;border-radius:12px;font-size:12.5px;
    font-family:var(--mono);word-break:break-all;display:none;
  }
  .result.success{background:var(--accent-green-dim);border:1px solid rgba(34,192,140,.4);color:var(--ok)}
  .result.error{background:rgba(164,31,19,.1);border:1px solid rgba(164,31,19,.35);color:var(--bad)}
</style>
</head>
<body>
<div class="box">
  <span class="tag">temp &middot; test page</span>
  <h1>O365 Authentication Test</h1>
  <p class="sub">Verifies the Microsoft Entra ID (Azure AD) OAuth2 authorization code flow end-to-end.</p>
  <a class="btn" href="/auth/o365/login">
    <svg viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="9" height="9" fill="#fff"/>
      <rect x="11" y="1" width="9" height="9" fill="#fff" fill-opacity=".7"/>
      <rect x="1" y="11" width="9" height="9" fill="#fff" fill-opacity=".7"/>
      <rect x="11" y="11" width="9" height="9" fill="#fff" fill-opacity=".9"/>
    </svg>
    Sign in with Microsoft
  </a>
  <div id="result" class="result"></div>
</div>
<script>
  (function(){
    var params = new URLSearchParams(window.location.search);
    var status = params.get('status');
    if (!status) return;
    var el = document.getElementById('result');
    el.style.display = 'block';
    el.className = 'result ' + (status === 'success' ? 'success' : 'error');
    if (status === 'success') {
      el.textContent = 'Signed in as: ' + (params.get('user') || 'unknown');
    } else {
      el.textContent = 'Error: ' + (params.get('message') || 'Authentication failed');
    }
  })();
</script>
</body>
</html>
