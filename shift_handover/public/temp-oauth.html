<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O365 OAuth Test</title>
<style>
  body{font-family:-apple-system,system-ui,sans-serif;background:#1c1f24;color:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .box{background:#262b32;border:1px solid #3a3f47;border-radius:10px;padding:32px 40px;max-width:480px;width:100%}
  h1{font-size:18px;margin:0 0 6px}
  p.sub{color:#9aa0a8;font-size:13px;margin:0 0 24px}
  a.btn{display:inline-flex;align-items:center;gap:8px;background:#2563eb;color:#fff;text-decoration:none;
    padding:10px 18px;border-radius:6px;font-size:14px;font-weight:600}
  a.btn:hover{background:#1d4ed8}
  .result{margin-top:24px;padding:14px 16px;border-radius:8px;font-size:13px;font-family:ui-monospace,Menlo,monospace;word-break:break-all;display:none}
  .result.success{background:rgba(34,192,140,.12);border:1px solid rgba(34,192,140,.4);color:#5fe3b8}
  .result.error{background:rgba(220,60,60,.12);border:1px solid rgba(220,60,60,.4);color:#f39b9b}
  .tag{display:inline-block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:#9aa0a8;border:1px solid #3a3f47;border-radius:4px;padding:2px 6px;margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <span class="tag">temp &middot; test page</span>
  <h1>O365 Authentication Test</h1>
  <p class="sub">Verifies the Microsoft Entra ID (Azure AD) OAuth2 authorization code flow end-to-end.</p>
  <a class="btn" href="/auth/o365/login">Sign in with Microsoft</a>
  <div id="result" class="result"></div>
</div>
<script>
  (function(){
    var params = new URLSearchParams(window.location.search);
    var status = params.get('status');
    if (!status) return;
    var el = document.getElementById('result');
    el.style.display = 'block';
    el.className = 'result ' + (status === 'success' ? 'success' : 'error');
    if (status === 'success') {
      el.textContent = 'Signed in as: ' + (params.get('user') || 'unknown');
    } else {
      el.textContent = 'Error: ' + (params.get('message') || 'Authentication failed');
    }
  })();
</script>
</body>
</html>
