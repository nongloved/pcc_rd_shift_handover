<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket ค้าง — All</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
  :root{
    --bg:#FAF5F1; --bg2:#E0DBD8; --panel:#FAF5F1; --panel2:#E0DBD8;
    --line:#E0DBD8; --line2:#A9A7A7;
    --txt:#292F36; --txt2:#292F36; --txt3:#727477;
    --signal:#A41F13; --day:#A07230; --night:#292F36; --ok:#3A7A50; --warn:#A07230; --bad:#A41F13;
    --p1:#C83030; --p2:#C86820; --p3:#A07230; --p4:#7A7060;
    --radius:10px;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:"IBM Plex Sans Thai",-apple-system,system-ui,sans-serif;
    --glass-bg:rgba(255,255,255,.82);
    --glass-bg-strong:rgba(255,255,255,.92);
    --glass-border:rgba(255,255,255,.7);
    --glass-highlight:rgba(255,255,255,.9);
    --glass-shadow:rgba(41,47,54,.22);
    --accent-blue:#3B82F6; --accent-blue-dim:rgba(59,130,246,.16);
    --accent-green:#22C08C; --accent-green-dim:rgba(34,192,140,.16);
    --bg-glow-1:rgba(59,130,246,.28); --bg-glow-2:rgba(34,192,140,.24);
  }

  body{font-family:var(--sans);background:
      radial-gradient(1100px 560px at 88% -8%, var(--bg-glow-1) 0%, transparent 60%),
      radial-gradient(900px 520px at -6% 22%, var(--bg-glow-2) 0%, transparent 58%),
      radial-gradient(1200px 600px at 80% -10%,#E0DBD8 0%,transparent 60%),
      var(--bg);
    background-attachment:fixed;
    color:var(--txt);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

  /* ---------- SHIFT LABEL ---------- */

  .shift-label .ic{font-size:14px}

  .toolbar input{font-family:var(--sans);font-size:12.5px;background:var(--panel);border:1px solid var(--line2);
    border-radius:7px;color:var(--txt);padding:8px 12px;outline:none;width:260px}

  .toolbar select{font-family:var(--mono);font-size:11px;background:var(--panel);border:1px solid var(--line2);border-radius:7px;color:var(--txt);padding:8px 10px;outline:none;cursor:pointer;max-width:200px}

  table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;min-width:1100px}
  col.c-num     {width:32px}
  col.c-ticket  {width:8%}
  col.c-worktype{width:9%}
  col.c-pri     {width:7%}
  col.c-status  {width:10%}
  col.c-subject {width:18%}
  col.c-reqtype {width:13%}
  col.c-site    {width:11%}
  col.c-note    {width:16%}
  col.c-due     {width:8%}

  .mono{font-family:var(--mono)}

  tbody tr{cursor:pointer}
  .pill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.4px;
    border-radius:5px;padding:2px 7px;white-space:nowrap;display:inline-block}
  .pri-Critical{background:#fde8ea;color:var(--p1);box-shadow:inset 0 0 0 1px #f8b4bb}
  .pri-High{background:#feebd8;color:var(--p2);box-shadow:inset 0 0 0 1px #f8c89a}
  .pri-Medium{background:#fef9d8;color:var(--p3);box-shadow:inset 0 0 0 1px #e8d060}
  .pri-Low{background:#e8eef5;color:#5b7290;box-shadow:inset 0 0 0 1px #5B88B2}
  .pri-Scheduled{background:#ece8f5;color:#6b5b9a;box-shadow:inset 0 0 0 1px #b8a8e0}
  .work-type{background:#f3e8ff;color:#6b21a8;box-shadow:inset 0 0 0 1px #d8b4fe}
  .status{background:#eef2e0;color:#4B5A2A;box-shadow:inset 0 0 0 1px #C3D08A}

  /* ---- detail popup ---- */

  .popup-box h3{margin:0 0 10px;font-size:16px;font-weight:700}

  /* ── Light theme ── */
</style>
</head>
<body>
<script src="/shared.js" data-init-theme></script>
<div class="wrap">
  <header>
    <div style="display:flex;align-items:center;gap:14px">
      <a href="/" class="back">← Back</a>
      <div>
        <h1>Ticket ค้าง — All</h1>
        <div class="meta" id="metaLine">Loading…</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button type="button" class="shift-label" id="toggle" title="คลิกเพื่อสลับกะ">
        <span class="ic" id="shiftIc">☀️</span><span class="txt" id="shiftTxt">กะกลางวัน</span>
      </button>
      <div class="toolbar" style="margin:0">
        <input id="search" placeholder="Search ticket no, subject, site…" oninput="applyFilter()">
        <select id="reqTypeFilter" onchange="applyFilter()">
          <option value="">All request types</option>
        </select>
        <select id="workTypeFilter" onchange="applyFilter()">
          <option value="">All work types</option>
        </select>
        <select id="priFilter" onchange="applyFilter()">
          <option value="">All priorities</option>
          <option value="Critical">Critical</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
          <option value="Scheduled">Scheduled</option>
        </select>
        <select id="statusFilter" onchange="applyFilter()">
          <option value="">All statuses</option>
        </select>
        <span class="count-label" id="countLabel"></span>
        <button class="back" onclick="load()" style="white-space:nowrap">↻ Refresh</button>
        <div class="export-wrap">
          <button class="back" onclick="toggleExportMenu()" style="white-space:nowrap">Export ▾</button>
          <div id="exportMenu" class="export-menu">
            <div class="export-menu-label">All tickets</div>
            <button onclick="exportTickets('json','all')">Export as JSON</button>
            <button onclick="exportTickets('csv','all')">Export as CSV</button>
            <div class="export-menu-label">Filtered view</div>
            <button onclick="exportTickets('json','filtered')">Export as JSON</button>
            <button onclick="exportTickets('csv','filtered')">Export as CSV</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <colgroup>
          <col class="c-num"><col class="c-ticket"><col class="c-worktype"><col class="c-pri"><col class="c-status">
          <col class="c-subject"><col class="c-reqtype"><col class="c-site"><col class="c-note"><col class="c-due">
        </colgroup>
        <thead>
          <tr>
            <th>#</th><th>Ticket No.</th><th>Work Type</th><th>Priority</th><th>Status</th>
            <th>Subject</th><th>Request Type</th><th>Site</th><th>Note</th><th>Due Date</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="10" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="capoLoader">
  <img src="/capoo-tired.gif" alt="Loading…">
  <p>Loading…</p>
</div>

<div class="popup-overlay" id="detailPopup">
  <div class="popup-box">
    <button class="close" id="detailPopupClose">×</button>
    <h3>Ticket Detail</h3>
    <div id="detailPopupBody"></div>
  </div>
</div>

<script>
(function(){
  var all = [];
  var currentFiltered = [];

  var esc = NOC.esc;
  var mapPriority = NOC.mapPriority;
  var formatDate = NOC.formatDate;

  function siteOf(t){return [t.location,t.room].filter(Boolean).join(" / ")||"—";}

  function populateFilterOptions(){
    var reqSel=document.getElementById("reqTypeFilter");
    var curReq=reqSel.value;
    var reqTypes=Array.from(new Set(all.map(function(t){return t.request_type;}).filter(Boolean))).sort();
    reqSel.innerHTML='<option value="">All request types</option>'+reqTypes.map(function(rt){
      return '<option value="'+esc(rt)+'"'+(rt===curReq?' selected':'')+'>'+esc(rt)+'</option>';
    }).join("");

    var statusSel=document.getElementById("statusFilter");
    var curStatus=statusSel.value;
    var counts={};
    all.forEach(function(t){var s=t.status; if(!s)return; counts[s]=(counts[s]||0)+1;});
    var statuses=Object.keys(counts).sort();
    statusSel.innerHTML='<option value="">All statuses ('+all.length+')</option>'+statuses.map(function(s){
      return '<option value="'+esc(s)+'"'+(s===curStatus?' selected':'')+'>'+esc(s)+' ('+counts[s]+')</option>';
    }).join("");

    var workTypeSel=document.getElementById("workTypeFilter");
    var curWorkType=workTypeSel.value;
    var workTypes=Array.from(new Set(all.map(function(t){return t.work_type;}).filter(Boolean))).sort();
    workTypeSel.innerHTML='<option value="">All work types</option>'+workTypes.map(function(wt){
      return '<option value="'+esc(wt)+'"'+(wt===curWorkType?' selected':'')+'>'+esc(wt)+'</option>';
    }).join("");
  }

  function render(records){
    var tb=document.getElementById("tbody");
    document.getElementById("countLabel").textContent=records.length+" / "+all.length+" tickets";
    if(!records.length){
      tb.innerHTML='<tr><td colspan="10" class="empty">No tickets found.</td></tr>';
      return;
    }
    var rows=records.map(function(t,i){
      var pri=mapPriority(t.priority);
      return '<tr class="row-entering" data-tid="'+t._id+'" style="animation-delay:'+(i*35)+'ms">'
        +'<td class="num">'+(i+1)+'</td>'
        +'<td class="mono">'+esc(t.ticket_id!=null?t.ticket_id:"—")+'</td>'
        +'<td><span class="pill work-type">'+esc(t.work_type||"—")+'</span></td>'
        +'<td><span class="pill pri-'+pri+'">'+pri+'</span></td>'
        +'<td><span class="pill status">'+esc(t.status||"—")+'</span></td>'
        +'<td>'+esc(t.subject||"—")+'</td>'
        +'<td style="font-size:11px">'+esc(t.request_type||"—")+'</td>'
        +'<td>'+esc(siteOf(t))+'</td>'
        +'<td>'+esc(t.note||"—")+'</td>'
        +'<td class="datecol">'+esc(formatDate(t.due_date))+'</td>'
      +'</tr>';
    });
    tb.innerHTML=rows.join("");
  }

  function ticketText(t){
    var parts=[t.ticket_id,t.circuit_id,t.subject,t.request_type,t.work_type,t.status,t.location,t.room,t.note,t.due_date,t.detail];
    return parts.filter(Boolean).join(" ").toLowerCase();
  }

  function applyFilter(){
    var q=document.getElementById("search").value.toLowerCase().trim();
    var rt=document.getElementById("reqTypeFilter").value;
    var wt=document.getElementById("workTypeFilter").value;
    var pf=document.getElementById("priFilter").value;
    var sf=document.getElementById("statusFilter").value;
    var filtered=all.filter(function(t){
      if(rt && t.request_type!==rt)return false;
      if(wt && t.work_type!==wt)return false;
      if(pf && mapPriority(t.priority)!==pf)return false;
      if(sf && t.status!==sf)return false;
      if(q&&ticketText(t).indexOf(q)<0)return false;
      return true;
    });
    currentFiltered=filtered;
    render(filtered);
  }

  /* ---- detail popup ---- */
  function openDetailPopup(t){
    var fields=[
      ["Ticket No.", t.ticket_id!=null?t.ticket_id:"—"],
      ["ประเภทของงาน", t.work_type||"—"],
      ["Priority", mapPriority(t.priority)],
      ["Status", t.status||"—"],
      ["Subject", t.subject||"—"],
      ["Request Type", t.request_type||"—"],
      ["Circuit ID", t.circuit_id||"—"],
      ["Site", siteOf(t)],
      ["Note", t.note||"—"],
      ["Detail", t.detail||"—"],
      ["Due Date", formatDate(t.due_date)],
      ["Reported At", formatDate(t.report_date)],
      ["Last Updated", formatDate(t.last_updated)]
    ];
    document.getElementById("detailPopupBody").innerHTML='<div class="popup-detail">'+fields.map(function(f){
      var val=f[1]==null?"—":String(f[1]);
      var isFull=val.length>36||val.indexOf("\n")>=0;
      return '<div class="row'+(isFull?' full':'')+'"><span class="lab">'+esc(f[0])+'</span><span class="val">'+esc(val)+'</span></div>';
    }).join("")+'</div>';
    document.getElementById("detailPopup").classList.add("open");
  }
  function closeDetailPopup(){document.getElementById("detailPopup").classList.remove("open");}
  document.getElementById("detailPopupClose").addEventListener("click",closeDetailPopup);
  document.getElementById("detailPopup").addEventListener("click",function(e){
    if(e.target.id==="detailPopup")closeDetailPopup();
  });
  document.addEventListener("keydown",function(e){
    if(e.key==="Escape")closeDetailPopup();
  });
  document.getElementById("tbody").addEventListener("click",function(e){
    var tr=e.target.closest("tr[data-tid]"); if(!tr)return;
    var t=all.find(function(x){return x._id===tr.dataset.tid;}); if(!t)return;
    openDetailPopup(t);
  });

  /* ---- export ---- */
  NOC.setupExportMenu();
  var csvEscape = NOC.csvEscape;
  var downloadBlob = NOC.downloadBlob;
  function toCSV(records){
    var headers=["Ticket No.","Work Type","Priority","Status","Subject","Request Type","Site","Note","Due Date"];
    var lines=[headers.join(",")];
    records.forEach(function(t){
      var row=[t.ticket_id,t.work_type,mapPriority(t.priority),t.status,t.subject,t.request_type,siteOf(t),t.note,t.due_date];
      lines.push(row.map(csvEscape).join(","));
    });
    return lines.join("\r\n");
  }
  function exportTickets(format,scope){
    var records=scope==="filtered"?currentFiltered:all;
    if(!records.length){alert("No tickets to export.");return;}
    document.getElementById("exportMenu").classList.remove("open");
    var stamp=NOC.bangkokStamp();
    var tag=scope==="filtered"?"pending-tickets-filtered-":"pending-tickets-";
    if(format==="json"){
      downloadBlob(JSON.stringify(records,null,2),tag+stamp+".json","application/json");
    } else {
      downloadBlob(toCSV(records),tag+stamp+".csv","text/csv;charset=utf-8;");
    }
  }

  /* ---- shift theme toggle ---- */
  NOC.initShiftToggle();

  /* ---- load ---- */
  async function load(){
    document.getElementById("capoLoader").style.display="flex";
    var delay=new Promise(function(r){setTimeout(r,1000);});
    try{
      var res=await fetch("/api/ma-tickets");
      if(!res.ok)throw new Error("HTTP "+res.status);
      var raw=await res.json();
      all=raw.map(function(t){
        return Object.assign({}, t, {note: NOC.cleanNote(t.note)});
      });
      populateFilterOptions();
      document.getElementById("metaLine").textContent=
        "Last loaded: "+new Date().toLocaleTimeString("en-GB")+" · "+all.length+" total tickets";
      await delay;
      applyFilter();
    }catch(e){
      await delay;
      document.getElementById("tbody").innerHTML=
        '<tr><td colspan="10" class="empty" style="color:var(--bad)">Cannot reach ticket API: '+esc(e.message)+'</td></tr>';
      document.getElementById("metaLine").textContent="Error loading data";
    }
    document.getElementById("capoLoader").style.display="none";
  }

  load();
  window.load=load;
  window.applyFilter=applyFilter;
  window.exportTickets=exportTickets;
})();
</script>
</body>
</html>
