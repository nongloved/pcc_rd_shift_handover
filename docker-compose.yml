name: pccrd

services:
  mongodb:
    image: mongo:latest
    container_name: pccrd_mongodb
    restart: unless-stopped
    ports:
      - "27119:27018"
    command: ["mongod", "--port", "27018"]
    volumes:
      - pccrd_mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}

  mail_monitoring:
    build:
      context: ./mail_monitoring
    container_name: pccrd_mail_monitoring
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file: .env
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: "27018"
      MONGO_DB: uih_pm_mails
      PROCESSED_FOLDER: /app/pdf_processed
    volumes:
      - pccrd_pdf_data:/app/pdf_processed
    extra_hosts:
      - "mongodb-primary:10.1.9.176"
      - "mongodb-secondary:10.1.9.177"
      - "mongodb-arbiter:10.1.9.178"
    command: ["python", "main.py"]

  helpdesk_monitoring:
    build:
      context: ./helpdesk_monitoring
    container_name: pccrd_helpdesk_monitoring
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file: .env
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: "27018"
      HELPDESK_MONGO_DB: ma_tickets
    extra_hosts:
      - "mongodb-primary:10.1.9.176"
      - "mongodb-secondary:10.1.9.177"
      - "mongodb-arbiter:10.1.9.178"
    command: ["python", "helpdesk_monitor.py"]

  api:
    build:
      context: ./api
    container_name: pccrd_api
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file: .env
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: "27018"
      MONGO_DB: uih_pm_mails
      HELPDESK_MONGO_DB: ma_tickets
      EMPLOYEE_MONGO_DB: helpdesk_user_db
    extra_hosts:
      - "mongodb-primary:10.1.9.176"
      - "mongodb-secondary:10.1.9.177"
      - "mongodb-arbiter:10.1.9.178"
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]

  shift_handover:
    build:
      context: ./shift_handover
    container_name: pccrd_shift_handover
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: "4102"
      UIH_API_URL: http://api:8000
    ports:
      - "4102:4102"

volumes:
  pccrd_mongo_data:
  pccrd_pdf_data:
